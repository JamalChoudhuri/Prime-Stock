<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Stock - Free Stock Photos</title>
    <!-- Tailwind CSS for Beautiful UI -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-950 font-sans">

    <!-- হেডার বা নেভিগেশন বার -->
    <header class="bg-white shadow-sm py-5 border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-extrabold text-blue-600 tracking-wide">Prime<span class="text-slate-800">Stock</span></a>
            <a href="/admin/" class="text-sm font-semibold text-slate-500 hover:text-blue-600 border border-slate-200 hover:border-blue-500 rounded-lg px-4 py-2 transition duration-300">
                অ্যাডমিন প্যানেল
            </a>
        </div>
    </header>

    <!-- হিরো সেকশন -->
    <section class="bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600 text-white py-20 text-center px-4">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-4xl sm:text-5xl font-black mb-4 tracking-tight leading-none">রয়্যালটি-ফ্রি চমৎকার সব স্টক ফটো</h2>
            <p class="text-blue-100 text-base sm:text-lg mb-8 max-w-xl mx-auto">আপনার পরবর্তী প্রজেক্ট, ডিজাইন বা ওয়েবসাইটের জন্য একদম হাই-রেজোলিউশন ইমেজ সম্পূর্ণ বিনামূল্যে ডাউনলোড করুন।</p>
        </div>
    </section>

    <!-- ফটো গ্যালারি গ্রিড -->
    <main class="max-w-6xl mx-auto px-4 py-16">
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
            <!-- ছবিগুলো জাভাস্ক্রিপ্ট দিয়ে গিটহাব থেকে এখানে এসে সাজবে -->
            <div id="loading" class="col-span-full py-12 flex flex-col items-center justify-center gap-3">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-slate-500 font-medium">ছবিগুলো লোড হচ্ছে...</p>
            </div>
        </div>
    </main>

    <!-- ফুটার -->
    <footer class="bg-white border-t border-slate-100 py-8 mt-20 text-center">
        <p class="text-sm text-slate-500">© 2026 Prime Stock. All rights reserved.</p>
    </footer>

    <!-- গিটহাব API থেকে ছবি আনার স্ক্রিপ্ট -->
    <script>
        // আপনার গিটহাব অ্যাকাউন্ট অনুযায়ী ডেটা
        const githubUser = "JamalChoudhuri";
        const repoName = "Prime-Stock"; 

        async function loadPrimeStockPhotos() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');
            
            try {
                // গিটহাব রিপোজিটরির images ফোল্ডারের ফাইল লিস্ট নিয়ে আসা হচ্ছে
                const response = await fetch(`https://api.github.com/repos/${githubUser}/${repoName}/contents/images`);
                
                if (!response.ok) {
                    throw new Error("ফোল্ডারটি এখনও তৈরি করা হয়নি বা খালি রয়েছে।");
                }
                
                const files = await response.json();
                loading.style.display = 'none';

                // শুধু ইমেজ ফাইলগুলো ফিল্টার করে নিচ্ছি
                const images = files.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));

                if (images.length === 0) {
                    gallery.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <p class="text-slate-500 text-lg mb-4">আপনার গ্যালারিতে এখনও কোনো ছবি নেই!</p>
                            <a href="/admin/" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition">প্রথম ছবি আপলোড করুন</a>
                        </div>
                    `;
                    return;
                }

                // ছবিগুলো ওয়েবসাইটে সাজানো হচ্ছে
                images.forEach(file => {
                    const imageUrl = file.download_url;
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition duration-300 flex flex-col";
                    
                    card.innerHTML = `
                        <div class="relative overflow-hidden group aspect-[4/3] bg-slate-100">
                            <img src="${imageUrl}" alt="${file.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy">
                        </div>
                        <div class="p-5 flex items-center justify-between mt-auto">
                            <span class="text-sm font-semibold text-slate-600 truncate max-w-[150px]" title="${file.name}">
                                ${file.name.split('.')[0]}
                            </span>
                            <a href="${imageUrl}" download target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 px-5 rounded-xl transition shadow-sm hover:shadow">
                                ডাউনলোড
                            </a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                loading.innerHTML = `
                    <p class="text-red-500 font-medium">ছবি লোড করা যায়নি।</p>
                    <p class="text-xs text-slate-400">নিশ্চিত করুন আপনার রিপোজিটরিতে "images" নামে একটি ফোল্ডার আছে এবং তাতে ছবি আপলোড করা হয়েছে।</p>
                `;
                console.error(error);
            }
        }

        loadPrimeStockPhotos();
        <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
    </script>
</body>
</html>
